name: Trigger Deploy Hook

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy configuration
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL secret is not configured"
            exit 1
          fi

          if [ -z "$DEPLOY_WEBHOOK_TOKEN" ]; then
            echo "DEPLOY_WEBHOOK_TOKEN secret is not configured"
            exit 1
          fi

      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "$DEPLOY_WEBHOOK_URL" \
            -H "X-Deploy-Token: $DEPLOY_WEBHOOK_TOKEN" \
            -H "Content-Type: application/json")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response: $body"
          echo "HTTP Code: $http_code"

          if [ "$http_code" != "200" ]; then
            echo "Deploy failed with HTTP $http_code"
            exit 1
          fi

          echo "Deploy successful!"
