version: '3.8'

# GTM Commercial Readiness - Ambiente All-in-One
# ===============================================
# Este arquivo sobe a stack inteira para demonstração 
# comercial ou desenvolvimento local unificado.

services:
  # 1. API Core do Chatbot (O bot em si)
  nexo-gov-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nexo-gov-api-demo
    ports:
      - "8101:8000"
    volumes:
      - ./prompts:/app/prompts:ro
      - ./base:/app/base:ro
    env_file:
      - .env
    environment:
      - ENV=dev
      - DEBUG=true
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - infra-network

  # 2. FastAPI do Admin System (Backend do Painel)
  nexo-admin:
    build:
      context: ./nexo-admin
      dockerfile: Dockerfile
    container_name: nexo-admin-demo
    ports:
      - "8093:8000"
    volumes:
      - ./nexo-admin/uploads:/app/uploads
    env_file:
      - ./nexo-admin/.env
    environment:
      - DEBUG=true
      - FRONTEND_URL=http://localhost:8080 # Para o CORS
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - infra-network

  # 3. React SPA do Admin System (Frontend do Painel)
  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
      args:
        # Quando construirmos a imagem, o Vite vai embutir esta URL na variavel process.env.VITE_API_URL
        - VITE_API_URL=http://localhost:8093
    container_name: admin-panel-demo
    ports:
      - "8080:80"
    depends_on:
      - nexo-admin
    networks:
      - infra-network

networks:
  infra-network:
    external: true
    name: infra_nexo-network
