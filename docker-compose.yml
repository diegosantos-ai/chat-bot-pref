services:
  chat-pref-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-pref-api
    restart: unless-stopped
    init: true
    env_file:
      - .env.compose
    ports:
      - "8000:8000"
    volumes:
      - chat_pref_data:/app/data

volumes:
  chat_pref_data:
