services:
  chat-pref-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-pref-api
    restart: unless-stopped
    environment:
      ENV: ${ENV:-prod}
      DEBUG: ${DEBUG:-false}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://localhost:5173","http://localhost:8000"]}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-["localhost","127.0.0.1","testserver"]}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
