# Chat Pref - Compose base para execucao local/servidor unico.
# Esta stack nao depende de rede externa privada.

services:
  chat-pref-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-pref-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./prompts:/app/prompts:ro
      - ./data/knowledge_base:/app/data/knowledge_base:ro
    env_file:
      - .env
    environment:
      - ENV=prod
      - DEBUG=false
      - LOG_LEVEL=INFO
      - LOG_JSON=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - chat-pref

networks:
  chat-pref:
    driver: bridge
