# ========================================
# Promtail Configuration
# ========================================
# Coleta de logs de múltiplas fontes
# Versão: 1.0

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchwait: 1s
    batchsize: 1048576
    timeout: 10s

scrape_configs:
# ========================================
# 1. Journald (Systemd logs)
# ========================================
  - job_name: journal
    journal:
      path: /var/log/journal
      max_age: 12h
      labels:
        job: systemd-journal
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'
      - source_labels: ['__journal__hostname']
        target_label: 'host'
      - source_labels: ['__journal__priority']
        target_label: 'level'
      - source_labels: ['__journal_syslog_identifier']
        target_label: 'syslog_identifier'

  # ========================================
  # 2. Nginx Access Logs
  # ========================================
  - job_name: nginx-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          logtype: access
          __path__: /var/log/nginx/access.log
    pipeline_stages:
      - json:
          expressions:
            remote_addr: remote_addr
            request: request
            status: status
            body_bytes_sent: body_bytes_sent
            http_user_agent: http_user_agent
      - labels:
          status:
          request_method:

  # ========================================
  # 3. Nginx Error Logs
  # ========================================
  - job_name: nginx-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          logtype: error
          __path__: /var/log/nginx/error.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\d{4}/\d{2}/\d{2} \d{2}:\d{2}:\d{2}) \[(?P<level>\w+)\] (?P<message>.*)$'
      - labels:
          level:

  # ========================================
  # 4. Docker Containers (Auto-discovery)
  # NOTA: Docker discovery desabilitado temporariamente devido a incompatibilidade
  # de versão de API. Para habilitar, atualize o Docker ou use versão compatível.
  # ========================================
  # - job_name: docker
  #   docker_sd_configs:
  #     - host: unix:///var/run/docker.sock
  #       refresh_interval: 5s
  #   relabel_configs:
  #     - source_labels: ['__meta_docker_container_name']
  #       regex: '/(.*)'
  #       target_label: 'container'
  #       replacement: '${1}'

  # ========================================
  # 5. PostgreSQL Logs (via journald)
  # ========================================
  - job_name: postgresql
    journal:
      max_age: 12h
      labels:
        job: postgresql
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        regex: 'postgresql.*'
        action: keep
      - source_labels: ['__journal__systemd_unit']
        target_label: 'unit'

  # ========================================
  # 6. Auth Logs (SSH/Login)
  # ========================================
  - job_name: auth-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          __path__: /var/log/auth.log
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w+ \d+ \d+:\d+:\d+) (?P<host>\S+) (?P<service>\S+): (?P<message>.*)$'
      - labels:
          service:

  # ========================================
  # 7. Syslog
  # ========================================
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          __path__: /var/log/syslog
    pipeline_stages:
      - regex:
          expression: '^(?P<timestamp>\w+ \d+ \d+:\d+:\d+) (?P<host>\S+) (?P<service>\S+): (?P<message>.*)$'
      - labels:
          service:
