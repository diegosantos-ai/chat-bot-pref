# Chat Pref Admin API - compose isolado para desenvolvimento local.

services:
  admin-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-pref-admin-api
    restart: unless-stopped
    ports:
      - "8093:8000"
    env_file:
      - .env
    environment:
      - DEBUG=false
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - chat-pref-admin

networks:
  chat-pref-admin:
    driver: bridge
