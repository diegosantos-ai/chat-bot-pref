apiVersion: 1
datasources:
  - name: Terezia
    type: postgres
    access: proxy
    url: host.docker.internal:5432
    database: terezia
    user: terezia
    secureJsonData:
      password: ""   # fill with DB password if needed
    isDefault: false
    jsonData:
      sslmode: "disable"
      maxOpenConns: 10
      maxIdleConns: 2
